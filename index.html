<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quackalog</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23f3d36b'/%3E%3Cpath d='M16 36c0-11 7-18 18-18 7 0 13 3 16 8l8 2-7 6c-1 10-8 16-19 16-10 0-16-5-16-14Z' fill='%23242b2f'/%3E%3Ccircle cx='39' cy='28' r='3' fill='%23f8f5e8'/%3E%3C/svg%3E"
    />
    <script>
      (() => {
        const theme = localStorage.getItem("quackalog.theme") || "system";
        const isDark = theme === "dark" || (theme === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        const resolvedTheme = isDark ? "dark" : "light";
        document.documentElement.classList.toggle("dark", isDark);
        document.documentElement.dataset.colorMode = resolvedTheme;
        document.documentElement.dataset.lightTheme = "light";
        document.documentElement.dataset.darkTheme = "dark";
        document.documentElement.style.colorScheme = resolvedTheme;
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
